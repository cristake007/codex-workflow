# Personal Codex configuration
#
# Installed to:
#   $CODEX_HOME/config.toml
# Default CODEX_HOME:
#   ~/.codex
#
# Active personal defaults are enabled below. Optional settings remain commented
# so they can be enabled deliberately.
# Current authoritative references:
#   https://developers.openai.com/codex/config-basic
#   https://developers.openai.com/codex/config-reference
#   https://developers.openai.com/codex/config-sample

# ---------------------------------------------------------------------------
# Active defaults
#
# Do not pin `model`, `review_model`, `model_provider`, or `service_tier` here.
# With ChatGPT authentication, Codex should select an available account model.
# Use `/model` inside Codex for an explicit selection when needed.
# ---------------------------------------------------------------------------

model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"
model_reasoning_summary = "auto"
model_verbosity = "medium"
personality = "pragmatic"
hide_agent_reasoning = false
show_raw_agent_reasoning = true

approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
web_search = "live"
file_opener = "vscode"

[sandbox_workspace_write]
network_access = true

# ---------------------------------------------------------------------------
# Model and response behavior
# ---------------------------------------------------------------------------

# Optional model pinning. Use only an exact identifier currently shown by
# Codex `/model` for the authenticated account. Unsupported or stale identifiers
# can prevent sessions from starting.
# model = "exact-model-id-from-/model"
#
# `/review` uses the current session model by default. Override only when the
# exact review model is known to be available to the current account.
# review_model = "exact-model-id-from-/model"
#
# Normally omit model_provider when authenticating through ChatGPT.
# model_provider = "openai"
#
# Alternative response settings. Do not duplicate an active key above; replace
# its active value instead.
# model_reasoning_effort = "low"
# model_reasoning_effort = "high"
# model_reasoning_effort = "xhigh"
# plan_mode_reasoning_effort = "high"
# model_reasoning_summary = "none"
# model_verbosity = "low"
# model_verbosity = "high"
# service_tier = "fast"
# service_tier = "flex"
# personality = "none"
# hide_agent_reasoning = true
# show_raw_agent_reasoning = false

