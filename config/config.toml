# Automatic local audit export for every Codex chat. The handler is installed
# through the disabled `chat-audit-export` infrastructure skill below.
[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'node "$HOME/.agents/skills/chat-audit-export/export-chat.mjs"'
command_windows = 'node "%USERPROFILE%\.agents\skills\chat-audit-export\export-chat.mjs"'
timeout = 10

[[hooks.PostToolUse]]
matcher = "^Bash$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'node "$HOME/.agents/skills/chat-audit-export/export-chat.mjs"'
command_windows = 'node "%USERPROFILE%\.agents\skills\chat-audit-export\export-chat.mjs"'
timeout = 10

# ---------------------------------------------------------------------------
# Features
#
# Feature flags change over time. Keep stable defaults unless a specific
# workflow requires an override.
# ---------------------------------------------------------------------------

[features]
hooks = true
# personality = true
# shell_tool = true
# unified_exec = true
# remote_plugin = true
# skill_mcp_dependency_install = true
# prevent_idle_sleep = false
# rollout_budget.enabled = false
# web_search = true
# web_search_cached = false
# web_search_request = false

# ---------------------------------------------------------------------------
# Skills
# ---------------------------------------------------------------------------

[skills]
# Keep the automatic skill-discovery instructions available to Codex so it can
# decide when a skill is relevant without the user naming it explicitly.
include_instructions = true

# Repository-managed design skill and official Repomix skill.
[[skills.config]]
name = "repomix-explorer"
enabled = true

[[skills.config]]
name = "software-design"
enabled = true

# Infrastructure only: the hook script must be installed, but Codex must never
# select this directory as a task skill.
[[skills.config]]
name = "chat-audit-export"
enabled = false

# Useful GitHub workflow skills kept enabled explicitly.
[[skills.config]]
name = "GitHub"
enabled = true

[[skills.config]]
name = "CI Debug"
enabled = true

[[skills.config]]
name = "Review Follow-up"
enabled = true

[[skills.config]]
name = "Publish Changes"
enabled = true

# Examples of optional bundled skills disabled by default for this coding setup.
# They remain installed and can be re-enabled from config.toml or the Skills UI.
[[skills.config]]
name = "Gmail"
enabled = false

[[skills.config]]
name = "Inbox Triage"
enabled = false

[[skills.config]]
name = "Analytics Dashboard"
enabled = false

[[skills.config]]
name = "Business Review"
enabled = false

[[skills.config]]
name = "Design Report"
enabled = false

[[skills.config]]
name = "Experiment Analysis"
enabled = false

[[skills.config]]
name = "Financial Budget"
enabled = false

[[skills.config]]
name = "Investment Committee Memo"
enabled = false

[[skills.config]]
name = "Legal Memorandum"
enabled = false

[[skills.config]]
name = "Market Trends Report"
enabled = false

# Alternative controls:
#
# Disable every bundled skill at once. This may also hide useful built-in skills,
# so individual entries above are safer for the normal coding workflow.
# [skills.bundled]
# enabled = false
#
# A skill can also be selected by the absolute path to its SKILL.md. Use either
# `name` or `path` in one entry, never both.
# [[skills.config]]
# path = "C:/Users/Example/.agents/skills/example/SKILL.md"
# enabled = false

